<!-- ── GARDEN HERO ─────────────────────────────────────────────────────────── -->
<section class="garden" id="garden" aria-label="Garden beds visualization">
  <!-- Sky color/sun/moon/clouds/veil/rain now render in the full-page
       #sky-backdrop (see _sky-backdrop.html + sky-backdrop.css) so the beds
       read as sitting inside the real sky. This strip keeps only the
       decorative horizon trees + birds; its own background is transparent
       (garden-hero.css) so the backdrop shows through. #garden-sky.is-night
       is still toggled by _updateSky() to ground the birds + darken trees. -->
  <div class="garden-sky" id="garden-sky">
    <!-- horizon trees (decorative backdrop, mixed sizes/species) -->
    <div class="garden-tree garden-tree-1" aria-hidden="true">
      <svg viewBox="0 0 40 52" preserveAspectRatio="xMidYMax meet" focusable="false"><use href="#sprite-tree-shrub"/></svg>
    </div>
    <div class="garden-tree garden-tree-2" aria-hidden="true">
      <svg viewBox="0 0 40 52" preserveAspectRatio="xMidYMax meet" focusable="false"><use href="#sprite-tree-poplar"/></svg>
    </div>
    <div class="garden-tree garden-tree-3" aria-hidden="true">
      <svg viewBox="0 0 40 52" preserveAspectRatio="xMidYMax meet" focusable="false"><use href="#sprite-tree-round"/></svg>
    </div>
    <div class="garden-tree garden-tree-4" aria-hidden="true">
      <svg viewBox="0 0 40 52" preserveAspectRatio="xMidYMax meet" focusable="false"><use href="#sprite-tree-poplar"/></svg>
    </div>
    <div class="garden-tree garden-tree-5" aria-hidden="true">
      <svg viewBox="0 0 40 52" preserveAspectRatio="xMidYMax meet" focusable="false"><use href="#sprite-tree-round"/></svg>
    </div>
    <div class="bird-container bird-container-one" aria-hidden="true"><div class="bird bird-one"></div></div>
    <div class="bird-container bird-container-two" aria-hidden="true"><div class="bird bird-two"></div></div>
    <div class="bird-container bird-container-three" aria-hidden="true"><div class="bird bird-three"></div></div>
    <div class="bird-container bird-container-four" aria-hidden="true"><div class="bird bird-four"></div></div>
  </div>
  <!-- grass horizon strip: stitches sky blue to ground brown -->
  <div class="garden-horizon" id="garden-horizon" aria-hidden="true"></div>
  <div class="garden-ground" id="garden-beds" aria-live="polite">
    <!-- bed cards injected by JS -->
  </div>
  <div class="sky-chips" role="region" aria-label="Outdoor conditions">
    <span class="sky-chip" aria-label="Outdoor temperature">
      <span aria-hidden="true">🌡️</span>
      <span class="sky-chip-label">Temp</span>
      <span id="wv-temp">—</span>
    </span>
    <span class="sky-chip" aria-label="Outdoor humidity">
      <span aria-hidden="true">💧</span>
      <span class="sky-chip-label">Humidity</span>
      <span id="wv-hum">—</span>
    </span>
    <span class="sky-chip" aria-label="Atmospheric pressure">
      <span aria-hidden="true">🌬️</span>
      <span class="sky-chip-label">Pressure</span>
      <span id="wv-pres">—</span>
    </span>
    <span class="sky-chip" aria-label="Current conditions">
      <span aria-hidden="true" id="wv-cond-emoji">🌤️</span>
      <span class="sky-chip-label">Now</span>
      <span id="wv-cond">—</span>
    </span>
  </div>
</section>
