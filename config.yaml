# garden-agent configuration
# All thresholds are versioned here; the LLM and deterministic rules both read from this.

# ── Sensor channel map ────────────────────────────────────────────────────────
# Maps storage keys to display config.  Order here drives display order in the dashboard.
# color: hex used in stat strip and charts.
# chart: false → stat-strip only (no time-series chart rendered).
# Add new channels here when new sensors appear — no code changes needed.
sensors:
  soilmoisture1:
    label: "Bed 1 moisture"
    color: "#4ade80"
    chart: false    # rendered as its own per-bed chart in the moisture row, not the generic grid
  soilmoisture2:
    label: "Bed 2 moisture"
    color: "#22c55e"
    chart: false    # rendered as its own per-bed chart in the moisture row, not the generic grid
  soilmoisture3:
    label: "Bed 3 moisture"
    color: "#16a34a"
    chart: false    # rendered as its own per-bed chart in the moisture row, not the generic grid
  soilmoisture4:
    label: "Bed 4 moisture"
    color: "#15803d"
    chart: false    # rendered as its own per-bed chart in the moisture row, not the generic grid
  temp_f:
    label: "Outdoor temp"
    color: "#fb923c"
    chart: true
  temp1_f:
    label: "Gazebo temp"
    color: "#fcd34d"
    chart: true
  humidity:
    label: "Outdoor humidity"
    color: "#60a5fa"
    chart: true
  humidity1:
    label: "Gazebo humidity"
    color: "#67e8f9"
    chart: true
  baromrel_inhg:
    label: "Pressure"
    color: "#a78bfa"
    chart: true
  baromabs_inhg:
    label: "Abs. pressure"
    color: "#8b5cf6"
    chart: false    # stat-strip only
  temp_in_f:
    label: "Indoor temp"
    color: "#fdba74"
    chart: false    # stat-strip only
  humidityin:
    label: "Indoor humidity"
    color: "#93c5fd"
    chart: false    # stat-strip only
  soilbatt1:
    label: "Battery"
    color: "#fbbf24"
    chart: false    # stat-strip only
  soilbatt2:
    label: "Battery"
    color: "#f59e0b"
    chart: false    # stat-strip only
  soilbatt3:
    label: "Battery"
    color: "#d97706"
    chart: false    # stat-strip only
  soilbatt4:
    label: "Battery"
    color: "#b45309"
    chart: false    # stat-strip only
  # ── derived metrics (computed from temp1_f + humidity1 at ingest time) ────
  vpd_kpa:
    label: "VPD"
    color: "#f97316"
    chart: true
  dewpoint_f:
    label: "Dew point"
    color: "#38bdf8"
    chart: true
  heatindex_f:
    label: "Feels like"
    color: "#ef4444"
    chart: false    # stat-strip only

# ── Dashboard layout ──────────────────────────────────────────────────────────
# Bed definitions and weather key bindings — injected into the browser as JSON.
# plants: sprite names (tomato | eggplant | okra | peas | sweet_pepper | hot_pepper | zucchini
#          | tomato_cherry | tomato_roma | tomato_beefsteak | tomato_heirloom | tomato_grape | tomato_san_marzano)
dashboard:
  beds:
    - id: bed1
      name: "Bed 1"
      sensors: {soil_moisture: soilmoisture1, soil_battery: soilbatt1}
      plants: [tomato_cherry, tomato_roma, tomato_beefsteak, tomato_heirloom, tomato_grape, tomato_san_marzano]
    - id: bed2
      name: "Bed 2"
      sensors: {soil_moisture: soilmoisture2, soil_battery: soilbatt2}
      plants: [eggplant, okra, okra, eggplant, okra, okra, okra, okra, okra, okra, okra, okra]
    - id: bed3
      name: "Bed 3"
      sensors: {soil_moisture: soilmoisture3, soil_battery: soilbatt3}
      plants: [sweet_pepper_red, sweet_pepper_yellow, sweet_pepper_green, sweet_pepper_orange]
    - id: bed4
      name: "Bed 4"
      sensors: {soil_moisture: soilmoisture4, soil_battery: soilbatt4}
      plants: [zucchini, eggplant]
      layout: vertical   # stack plants in a single column instead of side-by-side
  weather_keys: {temp: temp1_f, humidity: humidity1, pressure: baromrel_inhg}
  stat_groups:
    - name: "Bed 1"
      sensors: [soilmoisture1, soilbatt1]
    - name: "Bed 2"
      sensors: [soilmoisture2, soilbatt2]
    - name: "Bed 3"
      sensors: [soilmoisture3, soilbatt3]
    - name: "Bed 4"
      sensors: [soilmoisture4, soilbatt4]
    - name: "Gazebo"
      sensors: [temp1_f, humidity1]
    - name: "Station"
      sensors: [temp_f, humidity, temp_in_f, humidityin, baromrel_inhg, baromabs_inhg]
    - name: "Air"
      sensors: [vpd_kpa, dewpoint_f, heatindex_f]

# ── Alert thresholds (deterministic rules) ────────────────────────────────────
thresholds:
  soil_moisture_low:
    sensor_keys: [soilmoisture1, soilmoisture2, soilmoisture3, soilmoisture4]
    below: 30          # alert when moisture drops below this %
    consecutive: 3     # must see N consecutive readings below threshold

  soil_moisture_rapid_drop:
    sensor_keys: [soilmoisture1, soilmoisture2, soilmoisture3, soilmoisture4]
    drop_pct: 15       # alert if moisture drops this many % points in window_minutes
    window_minutes: 60

  soil_moisture_rapid_rise:
    sensor_keys: [soilmoisture1, soilmoisture2, soilmoisture3, soilmoisture4]
    rise_pct: 10       # alert if moisture rises this many % points in window_minutes (= watering event)
    window_minutes: 30

  # Tuning for garden.derived.analyze_watering()/drydown_rate() — characterizes
  # the full spike -> fallback -> drydown lifecycle behind the rapid_rise alert.
  watering_lifecycle:
    settle_window_minutes: 60      # spike+fallback region to exclude / plateau search
    drydown_lookback_hours: 48     # series window for drydown_rate
    noise_pct: 2.0                 # sensor-noise tolerance for baseline/settled medians
    good_soak_min_pct: 5.0         # absorbed >= this -> good soak
    runoff_max_pct: 2.0            # absorbed <= this -> runoff / hydrophobic soil
    overshoot_frac_max: 0.6        # overshoot/(peak-baseline) above this weakens "good"

  battery_low:
    sensor_keys: [soilbatt1, soilbatt2, soilbatt3, soilbatt4]
    below: 1.1         # WH51 battery ~1.5V nominal; warn below 1.1V

  temp_frost:
    sensor_keys: [temp_f]
    below: 35.6        # frost warning below 35.6°F (2°C)

  temp_heat:
    sensor_keys: [temp_f]
    above: 100.4       # heat stress above 100.4°F (38°C)

# ── Dead-sensor watchdog ──────────────────────────────────────────────────────
watchdog:
  timeout_minutes: 20  # alert if no POST from gateway in this many minutes
  sensor_timeout_minutes: 30  # alert if a specific sensor key stops appearing

# ── Alert cooldowns & de-dup ──────────────────────────────────────────────────
cooldowns:
  # After an alert fires, suppress re-alerts for this many minutes (time-based).
  soil_moisture_low_minutes: 120
  soil_moisture_rapid_drop_minutes: 60
  soil_moisture_rapid_rise_minutes: 60
  battery_low_minutes: 1440     # once per day
  temp_frost_minutes: 60
  temp_heat_minutes: 60
  watchdog_minutes: 360
  # After a watering event (rapid rise), suppress rapid-drop alerts for this long.
  # Prevents sensor-spike settling from being misread as a leak/drainage event.
  rapid_drop_after_watering_minutes: 120

# ── LLM model selection ───────────────────────────────────────────────────────
# Any Anthropic model ID works. Change here; no code edits needed.
# Model IDs: claude-sonnet-4-6, claude-haiku-4-5-20251001, claude-opus-4-8
llm:
  model: claude-sonnet-4-6
  max_tokens_alert: 110   # 1-2 sentences ~40-70 tokens; 110 is safe headroom
  max_tokens_brief: 350   # 3-4 structured HTML sections; 512 was ~45% wasted

# ── Weather forecast (Open-Meteo, no API key required) ───────────────────────
# Location is set in secrets.env (GARDEN_ZIPCODE etc.) — never here.
weather:
  enabled: true
  cache_minutes: 120    # how long to reuse a fetched forecast before refreshing
  current_cache_minutes: 15  # separate, shorter cache for "is it raining right now" data
  rain_lookahead_pct: 40  # next-12h peak rain probability that counts as "rain likely" (dashboard + LLM brief)

# ── Daily morning brief ───────────────────────────────────────────────────────
# Sent once per day around hour_local in your timezone.
# Timezone is set by GARDEN_TIMEZONE in secrets.env.
daily_brief:
  enabled: true
  hour_local: 7         # send around 7am local time

# ── Derived metric computation ────────────────────────────────────────────────
# VPD, dew point, and heat index are computed from a live temp+humidity source
# at ingest time and stored as regular sensor readings (auto-charts + agent).
# source.temp / source.humidity must match sensor keys that carry live data.
derived:
  enabled: true
  source:
    temp:     temp1_f      # gazebo WN31 — confirmed live outdoor air sensor
    humidity: humidity1    # gazebo WN31
  thresholds:
    vpd_low:      0.4      # kPa — below this: humid, slow transpiration, fungal risk
    vpd_high:     1.2      # kPa — above this: fast transpiration, watch moisture
    vpd_very_high: 2.0     # kPa — above this: drought/heat stress
  frost_dewpoint_f: 35.6   # °F — matches temp_frost threshold; dew point ≤ this → frost risk

# ── Per-crop ideal ranges (used by bed stress assessment) ─────────────────────
# moist: [min%, max%]  soil moisture from WH51
# temp:  [min°F, max°F] outdoor air temperature
# Override any value here; falls back to built-in defaults in garden/derived.py.
crops:
  tomato:       {moist: [50, 80], temp: [60, 95]}
  tomato_cherry:      {moist: [50, 80], temp: [60, 95]}
  tomato_roma:        {moist: [50, 80], temp: [60, 95]}
  tomato_beefsteak:   {moist: [50, 80], temp: [60, 95]}
  tomato_heirloom:    {moist: [50, 80], temp: [60, 95]}
  tomato_grape:       {moist: [50, 80], temp: [60, 95]}
  tomato_san_marzano: {moist: [50, 80], temp: [60, 95]}
  eggplant:     {moist: [50, 75], temp: [65, 95]}
  okra:         {moist: [40, 70], temp: [70, 100]}
  peas:         {moist: [60, 85], temp: [45, 75]}
  sweet_pepper: {moist: [50, 75], temp: [65, 90]}
  sweet_pepper_red:    {moist: [50, 75], temp: [65, 90]}
  sweet_pepper_green:  {moist: [50, 75], temp: [65, 90]}
  sweet_pepper_yellow: {moist: [50, 75], temp: [65, 90]}
  sweet_pepper_orange: {moist: [50, 75], temp: [65, 90]}
  hot_pepper:   {moist: [45, 70], temp: [65, 95]}
  zucchini:     {moist: [55, 80], temp: [60, 90]}
