# garden-agent configuration
# All thresholds are versioned here; the LLM and deterministic rules both read from this.

# ── Sensor channel map ────────────────────────────────────────────────────────
# Maps Ecowitt field names to human-friendly labels and their storage units.
# Add new channels here when new sensors appear — no code changes needed.
sensors:
  soilmoisture1:
    label: "Bed 1 soil moisture"
    unit: "%"
  soilmoisture2:
    label: "Bed 2 soil moisture"
    unit: "%"
  soilbatt1:
    label: "WH51 ch1 battery"
    unit: "V"
  soilbatt2:
    label: "WH51 ch2 battery"
    unit: "V"
  temp_f:                        # outdoor temp from station (°F, stored as-is)
    label: "Outdoor temperature"
    unit: "°F"
  humidity:
    label: "Outdoor humidity"
    unit: "%"
  temp_in_f:                     # indoor temp from station (°F, stored as-is)
    label: "Indoor temperature"
    unit: "°F"
  humidityin:
    label: "Indoor humidity"
    unit: "%"
  baromrel_inhg:                 # relative pressure from station (inHg, stored as-is)
    label: "Relative pressure"
    unit: "inHg"

# ── Alert thresholds (deterministic rules) ────────────────────────────────────
thresholds:
  soil_moisture_low:
    sensor_keys: [soilmoisture1, soilmoisture2]
    below: 30          # alert when moisture drops below this %
    consecutive: 3     # must see N consecutive readings below threshold

  soil_moisture_rapid_drop:
    sensor_keys: [soilmoisture1, soilmoisture2]
    drop_pct: 15       # alert if moisture drops this many % points in window_minutes
    window_minutes: 60

  battery_low:
    sensor_keys: [soilbatt1, soilbatt2]
    below: 1.1         # WH51 battery ~1.5V nominal; warn below 1.1V

  temp_frost:
    sensor_keys: [temp_f]
    below: 35.6        # frost warning below 35.6°F (2°C)

  temp_heat:
    sensor_keys: [temp_f]
    above: 100.4       # heat stress above 100.4°F (38°C)

# ── Dead-sensor watchdog ──────────────────────────────────────────────────────
watchdog:
  timeout_minutes: 20  # alert if no POST from gateway in this many minutes
  sensor_timeout_minutes: 30  # alert if a specific sensor key stops appearing

# ── Alert cooldowns & de-dup ──────────────────────────────────────────────────
cooldowns:
  # After an alert fires, suppress re-alerts for this many minutes
  # (alert-once-until-cleared: re-alerts only after the condition clears then re-trips)
  soil_moisture_low_minutes: 120
  soil_moisture_rapid_drop_minutes: 60
  battery_low_minutes: 1440     # once per day
  temp_frost_minutes: 60
  temp_heat_minutes: 60
  watchdog_minutes: 360

# ── LLM model selection ───────────────────────────────────────────────────────
# Any Anthropic model ID works. Change here; no code edits needed.
# Model IDs: claude-sonnet-4-6, claude-haiku-4-5-20251001, claude-opus-4-8
llm:
  model: claude-sonnet-4-6
  max_tokens_alert: 160   # 2-4 sentences ~80-120 tokens; 160 is safe headroom
  max_tokens_brief: 350   # 3-4 structured HTML sections; 512 was ~45% wasted

# ── Weather forecast (Open-Meteo, no API key required) ───────────────────────
# Location is set in secrets.env (GARDEN_ZIPCODE etc.) — never here.
weather:
  enabled: true
  cache_minutes: 120    # how long to reuse a fetched forecast before refreshing

# ── Daily morning brief ───────────────────────────────────────────────────────
# Replaces the old heartbeat. Sent once per day around hour_local in your timezone.
# Timezone is set by GARDEN_TIMEZONE in secrets.env.
daily_brief:
  enabled: true
  hour_local: 7         # send around 7am local time

# ── Heartbeat (kept for back-compat, superseded by daily_brief) ───────────────
heartbeat:
  enabled: false
